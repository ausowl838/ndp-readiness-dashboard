<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Medical Command Post — Readiness Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#060d14;font-family:'IBM Plex Mono',monospace;color:#c8d8e4;min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(74,158,255,0.05) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 100%,rgba(167,139,250,0.04) 0%,transparent 50%)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a1018}
::-webkit-scrollbar-thumb{background:#1e2a35;border-radius:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:rgba(10,16,24,0.95);border:1px solid #1e2a35;border-radius:12px;
  padding:40px 48px;width:400px;display:flex;flex-direction:column;gap:20px}
.pin-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid #1e2a35;border-radius:6px;
  color:#c8d8e4;padding:12px;font-size:20px;font-family:'IBM Plex Mono',monospace;
  text-align:center;letter-spacing:0.3em;outline:none}
.pin-input:focus{border-color:#4a9eff}
.login-btn{width:100%;padding:12px;background:rgba(74,158,255,0.12);border:1px solid #4a9eff;
  border-radius:6px;color:#4a9eff;font-family:'Syne',sans-serif;font-size:13px;
  font-weight:800;letter-spacing:0.1em;cursor:pointer}
.login-btn:hover{background:rgba(74,158,255,0.22)}

/* DASHBOARD */
#dashboard{display:none;flex-direction:column;gap:16px;padding:18px 22px;min-height:100vh}
.hdr{display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid #0e1c28;padding-bottom:14px}
.hdr-right{display:flex;align-items:center;gap:14px}
.user-pill{font-size:10px;color:#4a6a7a;background:rgba(255,255,255,0.04);
  border:1px solid #1e2a35;border-radius:4px;padding:4px 10px;
  display:flex;align-items:center;gap:8px}
.sign-out-btn{font-size:10px;color:#ff6666;background:none;border:none;
  cursor:pointer;font-family:'IBM Plex Mono',monospace}
.toggle-btn{padding:5px 12px;background:rgba(74,158,255,0.06);border:1px solid #1e3a5a;
  border-radius:4px;color:#4a7a9b;font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:0.08em;cursor:pointer;white-space:nowrap}
#goLiveBadge{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:6px;
  border:1px solid;font-family:'Syne',sans-serif;font-size:12px;font-weight:800;letter-spacing:0.12em}
#clockTime{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:#4a9eff;
  letter-spacing:0.05em;text-align:right}
#clockDate{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#4a6a7a;
  letter-spacing:0.1em;text-align:right}
.row-label{font-size:10px;color:#2e4a5a;letter-spacing:0.12em;font-weight:700;
  text-transform:uppercase;margin-bottom:6px}
.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.unit-card{background:rgba(10,16,24,0.6);border:1px solid #1e2a35;border-radius:8px;
  padding:10px 9px;cursor:pointer;text-align:left;transition:all 0.2s;width:100%}
.unit-card.active{border-color:#4a9eff;background:rgba(74,158,255,0.08);
  box-shadow:0 0 0 1px #4a9eff,0 4px 20px rgba(74,158,255,0.15)}
.detail-section{background:rgba(8,14,22,0.8);border:1px solid #0e1c28;
  border-radius:10px;padding:14px 18px}
.detail-panels{display:grid;grid-template-columns:1fr 2fr;gap:12px}
.panel{background:rgba(10,16,24,0.8);border:1px solid #0e1c28;border-radius:8px;padding:12px}
.panel-hdr{display:flex;align-items:center;gap:8px;padding-bottom:8px;
  border-bottom:1px solid #0e1c28;margin-bottom:10px}
.panel-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;
  color:#8a9aaa;letter-spacing:0.1em;flex:1}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;flex-shrink:0}
.bottom-panel{background:rgba(8,14,22,0.9);border:1px solid #0e1c28;
  border-radius:10px;padding:14px 18px}
.cat-label{font-size:9px;color:#3a5a6a;letter-spacing:0.1em;text-transform:uppercase;
  font-weight:700;margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid #0d1e2a}
button{font-family:'IBM Plex Mono',monospace}
input[type=number]{appearance:none;-moz-appearance:textfield}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div>
      <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#4a9eff;letter-spacing:0.06em;text-align:center">MEDICAL COMMAND POST</div>
      <div style="font-size:11px;color:#4a7a9b;letter-spacing:0.1em;text-align:center;margin-top:4px">READINESS COMMAND DASHBOARD · RESTRICTED</div>
    </div>
    <hr style="border:none;border-top:1px solid #1e2a35"/>
    <div>
      <div style="font-size:10px;color:#4a6a7a;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px">Enter Station PIN</div>
      <input id="pinInput" type="password" class="pin-input" placeholder="••••••••••" autocomplete="off"/>
    </div>
    <div id="loginError" style="font-size:11px;color:#ff4444;text-align:center;min-height:16px"></div>
    <button class="login-btn" onclick="doLogin()">ACCESS DASHBOARD</button>
    <div style="font-size:10px;color:#2e4a5a;text-align:center;letter-spacing:0.08em">⚠ AUTHORISED PERSONNEL ONLY</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="hdr">
    <div>
      <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#4a9eff;letter-spacing:0.06em">MEDICAL COMMAND POST</div>
      <div style="font-size:12px;color:#4a7a9b;letter-spacing:0.12em;margin-top:2px">READINESS COMMAND DASHBOARD &nbsp;·&nbsp; RESTRICTED, SENSITIVE (NORMAL)</div>
    </div>
    <div class="hdr-right">
      <button class="toggle-btn" id="toggleBtn" onclick="toggleDetail()">HIDE CHECKLIST ▲</button>
      <div class="user-pill"><span id="userLabel"></span><button class="sign-out-btn" onclick="doLogout()">SIGN OUT</button></div>
      <div id="goLiveBadge"></div>
      <div><div id="clockTime"></div><div id="clockDate"></div></div>
    </div>
  </div>

  <div>
    <div class="row-label">▸ Medical Posts</div>
    <div class="grid-5" id="row0"></div>
  </div>
  <div>
    <div class="row-label">▸ First Aid Posts</div>
    <div class="grid-3" id="row1"></div>
  </div>
  <div>
    <div class="row-label">▸ Specialist Units</div>
    <div class="grid-4" id="row2"></div>
  </div>

  <div class="detail-section" id="detailSection">
    <div id="detailHdr" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #0e1c28"></div>
    <div id="detailPanels" class="detail-panels"></div>
  </div>

  <div class="bottom-panel">
    <div style="display:flex;gap:24px;flex-wrap:wrap">
      <div style="flex:1;min-width:280px">
        <div style="font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:#4a6a7a;letter-spacing:0.12em;margin-bottom:8px">UNIT READINESS</div>
        <div id="unitReadiness" style="display:flex;gap:12px;flex-wrap:wrap"></div>
        <div id="readinessStatus" style="margin-top:6px;font-size:11px"></div>
        <div id="goLiveTime" style="margin-top:6px;font-size:11px;color:#00ff9d"></div>
      </div>
      <div style="min-width:240px">
        <div style="font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:#4a6a7a;letter-spacing:0.12em;margin-bottom:8px">
          COMMANDER'S READOUT
          <span id="cmdPct" style="font-size:10px;font-weight:700;margin-left:8px"></span>
        </div>
        <div id="cmdChecklist"></div>
      </div>
    </div>
    <div style="margin-top:12px;display:flex;align-items:center;gap:12px">
      <div style="font-family:'Syne',sans-serif;font-size:10px;font-weight:700;color:#4a6a7a;letter-spacing:0.12em;white-space:nowrap">COMMANDER'S NOTE</div>
      <textarea id="cmdNote" rows="1" placeholder="e.g. VVIP not required for CR2..."
        style="flex:1;background:transparent;border:none;border-bottom:1px solid #1e2a35;
        color:#8ab4a4;padding:4px 0;font-size:11px;resize:none;font-family:'IBM Plex Mono',monospace;
        outline:none;line-height:1.5"></textarea>
      <div id="goLiveBtn"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const db = getDatabase(initializeApp(firebaseConfig));

// ── PIN MAP ──────────────────────────────────────────────────────────────────
const PIN_MAP = {
  "cp1@Ndp2026":   {label:"CP1 (Commander)",       role:"commander"},
  "cp2@Ndp2026":   {label:"CP2 (Commander)",       role:"commander"},
  "mpN@Ndp2026":   {label:"MP North",              role:"unit",unitId:"MP1"},
  "mpS@Ndp2026":   {label:"MP South",              role:"unit",unitId:"MP2"},
  "mpA@Ndp2026":   {label:"MP Arena",              role:"unit",unitId:"MP3"},
  "mpW@Ndp2026":   {label:"MP WACA",               role:"unit",unitId:"MP4"},
  "mpV@Ndp2026":   {label:"MP VVIP",               role:"unit",unitId:"MP5"},
  "fapSh@Ndp2026": {label:"FAP(E) Show",           role:"unit",unitId:"FAP1"},
  "fapBe@Ndp2026": {label:"FAP(E) Beneficiaries",  role:"unit",unitId:"FAP2"},
  "fapCe@Ndp2026": {label:"FAP(E) Celebrations",   role:"unit",unitId:"FAP3"},
  "paed@Ndp2026":  {label:"Paediatric Team",       role:"unit",unitId:"PAED"},
  "qrt@Ndp2026":   {label:"QRT",                   role:"unit",unitId:"QRT"},

  "cp5@Ndp2026":   {label:"Amb Reserve (CP5)",     role:"unit",unitId:"CP5"},
};

async function hashPin(pin) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pin));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
const HASHED = {};
await Promise.all(Object.keys(PIN_MAP).map(async p => { HASHED[await hashPin(p)] = PIN_MAP[p]; }));

// ── UNIT DEFINITIONS ─────────────────────────────────────────────────────────
const UNITS = [
  {id:"MP1",  label:"MP North",             prefix:"MP",     type:"MP",   row:0},
  {id:"MP2",  label:"MP South",             prefix:"MP",     type:"MP",   row:0},
  {id:"MP3",  label:"MP Arena",             prefix:"MP",     type:"MP",   row:0},
  {id:"MP4",  label:"MP WACA",              prefix:"MP",     type:"MP",   row:0},
  {id:"MP5",  label:"MP VVIP",              prefix:"MP",     type:"MP",   row:0},
  {id:"FAP1", label:"FAP(E) Show",          prefix:"FAP(E)", type:"FAP",  row:1},
  {id:"FAP2", label:"FAP(E) Beneficiaries", prefix:"FAP(E)", type:"FAP",  row:1},
  {id:"FAP3", label:"FAP(E) Celebrations",  prefix:"FAP(E)", type:"FAP",  row:1},
  {id:"PAED", label:"Paediatric Team",      prefix:"",       type:"SPEC", row:2},
  {id:"QRT",  label:"QRT (1-4)",            prefix:"",       type:"SPEC", row:2},
  {id:"SBT",  label:"Stretcher Bearer",     prefix:"",       type:"SPEC", row:2},
  {id:"CP5",  label:"Amb Reserve CP5",      prefix:"",       type:"SPEC", row:2},
];

const SPEC_IDS = ["PAED","QRT","SBT","CP5"];
