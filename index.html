<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medical Command Post — Readiness Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // ─── FIREBASE CONFIG ────────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyAy9AaVjjVwuQb9K_nF8ep_eLOiba0F0IY",
      authDomain:        "ndp-medical-readiness.firebaseapp.com",
      databaseURL:       "https://ndp-medical-readiness-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId:         "ndp-medical-readiness",
      storageBucket:     "ndp-medical-readiness.firebasestorage.app",
      messagingSenderId: "496337210415",
      appId:             "1:496337210415:web:45056ad571386e7dcf8ada",
      measurementId:     "G-PGL2F26ZRM",
    };
    // ────────────────────────────────────────────────────────────────────────

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    // ─── PIN CONFIG (SHA-256 hashed) ────────────────────────────────────────
    // Pins: CP1=cp1@Ndp2026, CP2=cp2@Ndp2026, mpN=mpN@Ndp2026, etc.
    const PIN_MAP = {
      "cp1@Ndp2026":   { label: "CP1 (Commander)",       role: "commander" },
      "cp2@Ndp2026":   { label: "CP2 (Commander)",       role: "commander" },
      "mpN@Ndp2026":   { label: "MP North",              role: "post", postId: "MP1" },
      "mpS@Ndp2026":   { label: "MP South",              role: "post", postId: "MP2" },
      "mpA@Ndp2026":   { label: "MP Arena",              role: "post", postId: "MP3" },
      "mpW@Ndp2026":   { label: "MP WACA",               role: "post", postId: "MP4" },
      "mpV@Ndp2026":   { label: "MP VVIP",               role: "post", postId: "MP5" },
      "fapSh@Ndp2026": { label: "FAP(E) Show",           role: "post", postId: "FAP1" },
      "fapBe@Ndp2026": { label: "FAP(E) Beneficiaries",  role: "post", postId: "FAP2" },
      "fapCe@Ndp2026": { label: "FAP(E) Celebrations",   role: "post", postId: "FAP3" },
    };

    async function hashPin(pin) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pin));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
    }

    // Pre-hash all PINs at startup
    const HASHED_PINS = {};
    await Promise.all(Object.keys(PIN_MAP).map(async pin => {
      HASHED_PINS[await hashPin(pin)] = PIN_MAP[pin];
    }));

    // ─── DATA CONFIG ────────────────────────────────────────────────────────
    const POSTS = [
      { id: "MP1",  label: "MP North",             type: "MP",  template: "MP_STD"  },
      { id: "MP2",  label: "MP South",             type: "MP",  template: "MP_STD"  },
      { id: "MP3",  label: "MP Arena",             type: "MP",  template: "MP_STD"  },
      { id: "MP4",  label: "MP WACA",              type: "MP",  template: "MP_STD"  },
      { id: "MP5",  label: "MP VVIP",              type: "MP",  template: "MP_VVIP" },
      { id: "FAP1", label: "FAP(E) Show",          type: "FAP", template: "FAP"     },
      { id: "FAP2", label: "FAP(E) Beneficiaries", type: "FAP", template: "FAP"     },
      { id: "FAP3", label: "FAP(E) Celebrations",  type: "FAP", template: "FAP"     },
    ];

    const MANPOWER_TEMPLATE = {
      MP_STD: [
        { role: "Doctor",         required: 2 },
        { role: "Senior Medic",   required: 1 },
        { role: "Medic Spec",     required: 1 },
        { role: "Medic",          required: 6 },
        { role: "Paracounsellor", required: 2 },
        { role: "Attached Staff", required: 0 },
      ],
      MP_VVIP: [
        { role: "Doctor",         required: 2 },
        { role: "Nurse",          required: 2 },
        { role: "Attached Staff", required: 0 },
      ],
      FAP: [
        { role: "Doctor",         required: 1 },
        { role: "Medic",          required: 2 },
        { role: "Attached Staff", required: 0 },
      ],
    };

    const LOGISTICS_CHECKLIST = [
      "Resus Bay (functional)",
      "AED (charged & tested)",
      "Oxygen cylinder (full)",
      "Trauma bag (stocked)",
      "Spine board",
      "Cervical collars (S/M/L)",
      "Medications (checked)",
      "Electronic medical systems (online)",
      "Radio comms tested",
      "PPE stocks adequate",
    ];

    const AMBULANCE_CHECKLIST = [
      "Vehicle roadworthy",
      "Fuel ≥ 3/4 tank",
      "Stretcher secured",
      "Suction device operational",
      "Defibrillator onboard",
      "Driver briefed on route",
      "Comms radio functional",
      "Reverse park & standby",
    ];

    // ─── STATE ──────────────────────────────────────────────────────────────
    let currentUser  = null;   // { label, role, postId? }
    let activePost   = "MP1";
    let postData     = {};
    let goLiveStatus = false;
    let goLiveTime   = null;
    let loginAttempts = 0;
    const MAX_ATTEMPTS = 5;

    function buildBlankPostData() {
      const state = {};
      POSTS.forEach(post => {
        const tmpl = MANPOWER_TEMPLATE[post.template];
        state[post.id] = {
          manpower: tmpl.map((r, i) => ({
            id: i, role: r.role, required: r.required,
            names: r.required > 0
              ? Array(r.required).fill(null).map((_, j) => ({
                  name: r.required === 1 ? r.role : `${r.role} ${j+1}`,
                  present: false,
                }))
              : [],
            attachedCount: 0, attachedPresent: 0,
          })),
          logistics: LOGISTICS_CHECKLIST.map(item => ({ item, checked: false })),
          ambulance: AMBULANCE_CHECKLIST.map(item => ({ item, checked: false })),
        };
      });
      return state;
    }

    // ─── PIN AUTH ───────────────────────────────────────────────────────────
    window.doLogin = async () => {
      if (loginAttempts >= MAX_ATTEMPTS) {
        document.getElementById("loginError").textContent = "Too many attempts. Please refresh the page.";
        return;
      }
      const pin    = document.getElementById("pinInput").value.trim();
      const errEl  = document.getElementById("loginError");
      errEl.textContent = "";

      if (!pin) { errEl.textContent = "Please enter your PIN."; return; }

      const hashed = await hashPin(pin);
      const user   = HASHED_PINS[hashed];

      if (!user) {
        loginAttempts++;
        const remaining = MAX_ATTEMPTS - loginAttempts;
        errEl.textContent = remaining > 0
          ? `Invalid PIN. ${remaining} attempt(s) remaining.`
          : "Too many failed attempts. Please refresh.";
        document.getElementById("pinInput").value = "";
        return;
      }

      // Valid PIN
      currentUser = user;
      loginAttempts = 0;
      sessionStorage.setItem("ndp_readiness_user", JSON.stringify(user));

      // If post user, set their post as active
      if (user.role === "post") activePost = user.postId;

      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("dashboard").style.display   = "flex";
      document.getElementById("userLabel").textContent     = user.label;

      postData = buildBlankPostData();
      listenToData();
    };

    window.doLogout = () => {
      sessionStorage.removeItem("ndp_readiness_user");
      currentUser = null;
      document.getElementById("loginScreen").style.display = "flex";
      document.getElementById("dashboard").style.display   = "none";
      document.getElementById("pinInput").value = "";
      document.getElementById("loginError").textContent = "";
    };

    // Restore session
    const savedUser = sessionStorage.getItem("ndp_readiness_user");
    if (savedUser) {
      currentUser = JSON.parse(savedUser);
      if (currentUser.role === "post") activePost = currentUser.postId;
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("dashboard").style.display   = "flex";
      document.getElementById("userLabel").textContent     = currentUser.label;
      postData = buildBlankPostData();
      listenToData();
    }

    // Enter key support
    document.addEventListener("keydown", e => {
      if (e.key === "Enter" && document.getElementById("loginScreen").style.display !== "none") {
        window.doLogin();
      }
    });

    // ─── CALCULATIONS ───────────────────────────────────────────────────────
    function calcManpowerPct(data) {
      const mandatory = data.filter(r => r.required > 0);
      if (!mandatory.length) return 100;
      const totalReq  = mandatory.reduce((s, r) => s + r.required, 0);
      const totalPres = mandatory.reduce((s, r) => s + r.names.filter(n => n.present).length, 0);
      return Math.round((totalPres / totalReq) * 100);
    }
    function calcChecklistPct(list) {
      if (!list.length) return 0;
      return Math.round((list.filter(i => i.checked).length / list.length) * 100);
    }
    function overallReadiness(pd) {
      return Math.round((calcManpowerPct(pd.manpower) + calcChecklistPct(pd.logistics) + calcChecklistPct(pd.ambulance)) / 3);
    }
    function statusColor(pct) {
      return pct === 100 ? "#00ff9d" : pct >= 70 ? "#ffb800" : "#ff4444";
    }

    // ─── FIREBASE SYNC ──────────────────────────────────────────────────────
    function listenToData() {
      onValue(ref(db, "readiness"), snap => {
        const val = snap.val();
        if (val && val.posts) {
          POSTS.forEach(p => { if (val.posts[p.id]) postData[p.id] = val.posts[p.id]; });
        }
        if (val && val.goLive !== undefined) {
          goLiveStatus = val.goLive.active || false;
          goLiveTime   = val.goLive.time   || null;
        }
        renderDashboard();
      });
    }

    function savePostData(postId) {
      update(ref(db, `readiness/posts/${postId}`), postData[postId]);
    }
    function saveGoLive(active) {
      set(ref(db, "readiness/goLive"), {
        active,
        time: active ? new Date().toISOString() : null,
        declaredBy: currentUser?.label || "Commander",
      });
    }

    // ─── RENDER HELPERS ─────────────────────────────────────────────────────
    function radialGaugeSVG(pct, size = 56) {
      const r = (size-8)/2, circ = 2*Math.PI*r, stroke = (pct/100)*circ;
      const color = statusColor(pct);
      return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1e2530" stroke-width="5"/>
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="5"
          stroke-dasharray="${stroke} ${circ}" stroke-linecap="round"
          style="filter:drop-shadow(0 0 4px ${color})"/>
        <text x="${size/2}" y="${size/2}" text-anchor="middle" dominant-baseline="central"
          style="transform:rotate(90deg);transform-origin:${size/2}px ${size/2}px;
          fill:${color};font-size:11px;font-family:'IBM Plex Mono',monospace;font-weight:600">
          ${pct}%</text></svg>`;
    }
    function progressBar(pct) {
      const color = statusColor(pct);
      return `<div style="height:3px;background:#1a2530;border-radius:2px;margin-top:2px">
        <div style="height:100%;border-radius:2px;width:${pct}%;background:${color};
          box-shadow:0 0 4px ${color};transition:width 0.4s ease"></div></div>`;
    }
    const inputStyle = `width:52px;background:rgba(255,255,255,0.04);border:1px solid #1e2a35;
      border-radius:4px;color:#c8d8e4;padding:4px 6px;font-size:11px;
      font-family:'IBM Plex Mono',monospace;outline:none`;

    // ─── MAIN RENDER ────────────────────────────────────────────────────────
    function renderDashboard() {
      renderOverviewGrid();
      renderDetailPanel();
      renderGoLivePanel();
      renderGoLiveBadge();
    }

    function renderOverviewGrid() {
      document.getElementById("overviewGrid").innerHTML = POSTS.map(post => {
        const pd = postData[post.id];
        const mp = calcManpowerPct(pd.manpower), lg = calcChecklistPct(pd.logistics), amb = calcChecklistPct(pd.ambulance);
        const overall = overallReadiness(pd), isActive = activePost === post.id;
        const prefix = post.type === "FAP" ? "FAP(E)" : "MP";
        const name   = post.label.replace(/^MP\s+|^FAP\(E\)\s+/, "");
        const pc     = post.type === "FAP" ? "#a78bfa" : "#4a9eff";
        const border = isActive ? "#4a9eff" : overall === 100 ? "#00ff9d33" : "#1e2a35";
        const bg     = isActive ? "rgba(74,158,255,0.08)" : "rgba(10,16,24,0.6)";
        const shadow = isActive ? "0 0 0 1px #4a9eff,0 4px 20px rgba(74,158,255,0.15)" : "none";
        return `<button onclick="selectPost('${post.id}')" style="background:${bg};border:1px solid ${border};
          border-radius:8px;padding:12px 10px;cursor:pointer;transition:all 0.2s;text-align:left;
          box-shadow:${shadow};width:100%">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
            <div>
              <div style="font-size:11px;font-weight:700;letter-spacing:0.1em;color:${pc};margin-bottom:1px">${prefix}</div>
              <div style="font-size:15px;font-weight:700;color:#e8f0f7;font-family:'Barlow Condensed',sans-serif;
                letter-spacing:0.04em;line-height:1.3">${name}</div>
            </div>${radialGaugeSVG(overall,52)}
          </div>
          ${[["MANPOWER",mp],["LOGISTICS",lg],["AMBULANCE",amb]].map(([l,p])=>`
            <div style="margin-bottom:4px">
              <div style="display:flex;justify-content:space-between">
                <span style="font-size:9px;color:#4a5a6a;letter-spacing:0.08em">${l}</span>
                <span style="font-size:9px;color:${statusColor(p)}">${p}%</span>
              </div>${progressBar(p)}
            </div>`).join("")}
        </button>`;
      }).join("");
    }

    function renderDetailPanel() {
      const post = POSTS.find(p => p.id === activePost);
      const pd   = postData[activePost];
      const prefix = post.type === "FAP" ? "FAP(E)" : "MEDICAL POST";
      const pc     = post.type === "FAP" ? "#a78bfa" : "#4a9eff";
      const pbg    = post.type === "FAP" ? "rgba(167,139,250,0.1)" : "rgba(74,158,255,0.1)";
      document.getElementById("detailHeader").innerHTML = `
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:11px;font-weight:700;letter-spacing:0.1em;color:${pc};
            background:${pbg};padding:3px 8px;border-radius:4px">${prefix}</span>
          <span style="font-size:20px;font-weight:700;color:#e8f0f7;
            font-family:'Syne',sans-serif;letter-spacing:0.04em">${post.label}</span>
        </div>
        <div style="font-size:12px;color:#4a6a7a">Click any post card above to switch</div>`;
      document.getElementById("manpowerPanel").innerHTML  = renderManpowerPanel(pd.manpower);
      document.getElementById("logisticsPanel").innerHTML = renderChecklistPanel("LOGISTICS / EQUIPMENT", pd.logistics, "logistics");
      document.getElementById("ambulancePanel").innerHTML = renderChecklistPanel("AMBULANCE", pd.ambulance, "ambulance");
    }

    function renderManpowerPanel(data) {
      const pct = calcManpowerPct(data), color = statusColor(pct);
      return `<div style="display:flex;align-items:center;gap:8px;padding-bottom:8px;
          border-bottom:1px solid #0e1c28;margin-bottom:10px">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;
            background:${color};box-shadow:0 0 6px ${color}"></span>
          <span style="font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
            color:#8a9aaa;letter-spacing:0.1em;flex:1">MANPOWER</span>
          <span style="font-size:13px;font-weight:700;color:${color}">${pct}%</span>
        </div>
        ${data.map((role,ri) => `
          <div style="margin-bottom:8px">
            <div style="font-size:10px;color:#4a6a7a;letter-spacing:0.08em;
              text-transform:uppercase;margin-bottom:3px">${role.role}</div>
            ${role.role === "Attached Staff" ? `
              <div style="display:flex;gap:6px;align-items:center">
                <input type="number" min="0" value="${role.attachedCount}"
                  onchange="updateAttached(${ri},'count',this.value)"
                  placeholder="Total" style="${inputStyle}" />
                <span style="font-size:11px;color:#4a5a6a">/</span>
                <input type="number" min="0" value="${role.attachedPresent}"
                  onchange="updateAttached(${ri},'present',this.value)"
                  placeholder="Present" style="${inputStyle}" />
                <span style="font-size:11px;color:#4a5a6a">present</span>
              </div>` : `
              <div style="display:flex;flex-wrap:wrap;gap:4px">
                ${role.names.map((person,ni) => {
                  const bc = person.present?"#00ff9d":"#2e3a4a";
                  const bg = person.present?"rgba(0,255,157,0.15)":"rgba(255,255,255,0.04)";
                  const fc = person.present?"#00ff9d":"#6b7d8f";
                  return `<button onclick="togglePerson(${ri},${ni})"
                    style="padding:4px 8px;border-radius:4px;border:1px solid ${bc};
                    background:${bg};color:${fc};font-size:10px;cursor:pointer;
                    font-family:'IBM Plex Mono',monospace;transition:all 0.15s">
                    ${person.name}</button>`;
                }).join("")}
              </div>`}
          </div>`).join("")}`;
    }

    function renderChecklistPanel(title, items, domain) {
      const pct = calcChecklistPct(items), color = statusColor(pct);
      return `<div style="display:flex;align-items:center;gap:8px;padding-bottom:8px;
          border-bottom:1px solid #0e1c28;margin-bottom:10px">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;
            background:${color};box-shadow:0 0 6px ${color}"></span>
          <span style="font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
            color:#8a9aaa;letter-spacing:0.1em;flex:1">${title}</span>
          <span style="font-size:13px;font-weight:700;color:${color}">${pct}%</span>
        </div>
        ${items.map((item,i) => {
          const bc = item.checked?"#00ff9d":"#2e3a4a";
          const bg = item.checked?"rgba(0,255,157,0.15)":"transparent";
          const fc = item.checked?"#c8d8e4":"#5a6a7a";
          return `<label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:3px 0">
            <input type="checkbox" ${item.checked?"checked":""} onchange="toggleChecklist('${domain}',${i})"
              style="display:none"/>
            <span style="width:16px;height:16px;border:1px solid ${bc};border-radius:3px;
              background:${bg};display:flex;align-items:center;justify-content:center;
              flex-shrink:0;transition:all 0.15s">
              ${item.checked?`<span style="color:#00ff9d;font-size:9px;line-height:1">✓</span>`:""}
            </span>
            <span style="font-size:11px;color:${fc}">${item.item}</span>
          </label>`;
        }).join("")}`;
    }

    function renderGoLivePanel() {
      const allReady = POSTS.every(p => overallReadiness(postData[p.id]) === 100);
      const notReady = POSTS.filter(p => overallReadiness(postData[p.id]) < 100).length;
      document.getElementById("goLiveAssessment").innerHTML = `
        <div style="font-family:'Syne',sans-serif;font-size:11px;font-weight:700;
          color:#4a6a7a;letter-spacing:0.12em;margin-bottom:8px">COMMANDER ASSESSMENT</div>
        <div style="display:flex;gap:20px;flex-wrap:wrap">
          ${POSTS.map(post => {
            const overall = overallReadiness(postData[post.id]);
            const color   = statusColor(overall);
            return `<div style="display:flex;align-items:center;gap:6px">
              <span style="display:inline-block;width:8px;height:8px;border-radius:50%;
                background:${color};box-shadow:0 0 5px ${color}"></span>
              <span style="font-size:12px;color:#8a9aaa">${post.label}</span>
              <span style="font-size:11px;font-weight:700;color:${color}">${overall}%</span>
            </div>`;
          }).join("")}
        </div>
        ${goLiveTime ? `<div style="margin-top:8px;font-size:12px;color:#00ff9d">
          GO LIVE declared at ${new Date(goLiveTime).toLocaleTimeString("en-SG",{hour12:false})}
          by ${currentUser?.label||"Commander"}</div>` : ""}
        ${!allReady && !goLiveStatus ? `<div style="margin-top:6px;font-size:11px;color:#ffb800">
          ⚠ ${notReady} post(s) not yet at 100% readiness</div>` : ""}`;
      document.getElementById("goLiveBtn").innerHTML = !goLiveStatus
        ? `<button onclick="declareGoLive()" style="padding:10px 24px;background:rgba(0,255,157,0.1);
            border:1px solid #00ff9d;border-radius:6px;color:#00ff9d;font-family:'Syne',sans-serif;
            font-size:13px;font-weight:800;letter-spacing:0.1em;cursor:pointer">DECLARE GO LIVE</button>`
        : `<button onclick="declareStandDown()" style="padding:10px 24px;background:rgba(255,68,68,0.1);
            border:1px solid #ff4444;border-radius:6px;color:#ff4444;font-family:'Syne',sans-serif;
            font-size:13px;font-weight:800;letter-spacing:0.1em;cursor:pointer">STAND DOWN</button>`;
    }

    function renderGoLiveBadge() {
      const badge = document.getElementById("goLiveBadge");
      const color = goLiveStatus ? "#00ff9d" : "#ff4444";
      const bg    = goLiveStatus ? "rgba(0,255,157,0.12)" : "rgba(255,68,68,0.1)";
      badge.style.cssText += `;background:${bg};border-color:${color};color:${color}`;
      badge.innerHTML = `<span style="width:8px;height:8px;border-radius:50%;background:${color};
        box-shadow:0 0 8px ${color};display:inline-block;
        animation:${goLiveStatus?"pulse 1.5s infinite":"none"}"></span>
        ${goLiveStatus ? "GO LIVE" : "STANDBY"}`;
    }

    // ─── EVENT HANDLERS ─────────────────────────────────────────────────────
    window.selectPost = (postId) => { activePost = postId; renderDashboard(); };

    window.togglePerson = (roleIdx, nameIdx) => {
      postData[activePost].manpower[roleIdx].names[nameIdx].present =
        !postData[activePost].manpower[roleIdx].names[nameIdx].present;
      savePostData(activePost);
      renderDetailPanel(); renderOverviewGrid(); renderGoLivePanel();
    };
    window.updateAttached = (roleIdx, field, val) => {
      const num = Math.max(0, parseInt(val)||0);
      const role = postData[activePost].manpower[roleIdx];
      if (field === "count") role.attachedCount = num;
      else role.attachedPresent = Math.min(num, role.attachedCount);
      savePostData(activePost);
      renderOverviewGrid(); renderGoLivePanel();
    };
    window.toggleChecklist = (domain, idx) => {
      postData[activePost][domain][idx].checked = !postData[activePost][domain][idx].checked;
      savePostData(activePost);
      renderDetailPanel(); renderOverviewGrid(); renderGoLivePanel();
    };
    window.declareGoLive    = () => saveGoLive(true);
    window.declareStandDown = () => saveGoLive(false);

    // ─── CLOCK ──────────────────────────────────────────────────────────────
    function tickClock() {
      const now = new Date();
      const t = document.getElementById("clockTime");
      const d = document.getElementById("clockDate");
      if (t) t.textContent = now.toLocaleTimeString("en-SG", { hour12: false });
      if (d) d.textContent = now.toLocaleDateString("en-SG", { day:"2-digit", month:"short", year:"numeric" });
    }
    setInterval(tickClock, 1000);
    tickClock();
  </script>
