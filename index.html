<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Medical Command Post — Readiness Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#060d14;font-family:'IBM Plex Mono',monospace;color:#c8d8e4;min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(74,158,255,0.05) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 100%,rgba(167,139,250,0.04) 0%,transparent 50%)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a1018}
::-webkit-scrollbar-thumb{background:#1e2a35;border-radius:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:rgba(10,16,24,0.95);border:1px solid #1e2a35;border-radius:12px;
  padding:40px 48px;width:400px;display:flex;flex-direction:column;gap:20px}
.pin-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid #1e2a35;border-radius:6px;
  color:#c8d8e4;padding:12px;font-size:20px;font-family:'IBM Plex Mono',monospace;
  text-align:center;letter-spacing:0.3em;outline:none}
.pin-input:focus{border-color:#4a9eff}
.login-btn{width:100%;padding:12px;background:rgba(74,158,255,0.12);border:1px solid #4a9eff;
  border-radius:6px;color:#4a9eff;font-family:'Syne',sans-serif;font-size:13px;
  font-weight:800;letter-spacing:0.1em;cursor:pointer}
.login-btn:hover{background:rgba(74,158,255,0.22)}

/* DASHBOARD */
#dashboard{display:none;flex-direction:column;gap:16px;padding:18px 22px;min-height:100vh}
.hdr{display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid #0e1c28;padding-bottom:14px}
.hdr-right{display:flex;align-items:center;gap:14px}
.user-pill{font-size:10px;color:#4a6a7a;background:rgba(255,255,255,0.04);
  border:1px solid #1e2a35;border-radius:4px;padding:4px 10px;
  display:flex;align-items:center;gap:8px}
.sign-out-btn{font-size:10px;color:#ff6666;background:none;border:none;
  cursor:pointer;font-family:'IBM Plex Mono',monospace}
.toggle-btn{padding:5px 12px;background:rgba(74,158,255,0.06);border:1px solid #1e3a5a;
  border-radius:4px;color:#4a7a9b;font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:0.08em;cursor:pointer;white-space:nowrap}
#goLiveBadge{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:6px;
  border:1px solid;font-family:'Syne',sans-serif;font-size:12px;font-weight:800;letter-spacing:0.12em}
#clockTime{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:#4a9eff;
  letter-spacing:0.05em;text-align:right}
#clockDate{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#4a6a7a;
  letter-spacing:0.1em;text-align:right}
.row-label{font-size:10px;color:#2e4a5a;letter-spacing:0.12em;font-weight:700;
  text-transform:uppercase;margin-bottom:6px}
.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.unit-card{background:rgba(10,16,24,0.6);border:1px solid #1e2a35;border-radius:8px;
  padding:10px 9px;cursor:pointer;text-align:left;transition:all 0.2s;width:100%}
.unit-card.active{border-color:#4a9eff;background:rgba(74,158,255,0.08);
  box-shadow:0 0 0 1px #4a9eff,0 4px 20px rgba(74,158,255,0.15)}
.detail-section{background:rgba(8,14,22,0.8);border:1px solid #0e1c28;
  border-radius:10px;padding:14px 18px}
.detail-panels{display:grid;grid-template-columns:1fr 2fr;gap:12px}
.panel{background:rgba(10,16,24,0.8);border:1px solid #0e1c28;border-radius:8px;padding:12px}
.panel-hdr{display:flex;align-items:center;gap:8px;padding-bottom:8px;
  border-bottom:1px solid #0e1c28;margin-bottom:10px}
.panel-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;
  color:#8a9aaa;letter-spacing:0.1em;flex:1}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;flex-shrink:0}
.bottom-panel{background:rgba(8,14,22,0.9);border:1px solid #0e1c28;
  border-radius:10px;padding:14px 18px}
.cat-label{font-size:9px;color:#3a5a6a;letter-spacing:0.1em;text-transform:uppercase;
  font-weight:700;margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid #0d1e2a}
button{font-family:'IBM Plex Mono',monospace}
input[type=number]{appearance:none;-moz-appearance:textfield}
</style>

async function hashPin(pin) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pin));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
const HASHED = {};
await Promise.all(Object.keys(PIN_MAP).map(async p => { HASHED[await hashPin(p)] = PIN_MAP[p]; }));

const SPEC_CHECKLISTS = {

// ── BUILD BLANK STATE ─────────────────────────────────────────────────────────
function blankManpower(unitId) {
  if (SPEC_IDS.includes(unitId)) return [];
  const tmpl = MP_TEMPLATES[unitId];
  if (!tmpl) return [];
  return tmpl.roles.map((r,i) => ({
    id:i, role:r.r, required:r.n,
    names: r.n > 0 ? Array(r.n).fill(null).map((_,j) => ({
      name: r.n===1 ? r.r : `${r.r} ${j+1}`, present:false, ts:null
    })) : [],
    attachedCount:0, attachedPresent:0,
  }));
}
function blankLogistics(unitId) {
  if (unitId.startsWith("MP")) return LOGISTICS.MP_STD.map(x=>({...x,checked:false,ts:null}));
  if (unitId.startsWith("FAP")) return LOGISTICS.FAP.map(x=>({...x,checked:false,ts:null}));
  return null;
}
function blankAmbulance(unitId) {
  if (unitId.startsWith("MP")||unitId.startsWith("FAP"))
    return AMBULANCE.map(x=>({...x,checked:false,ts:null}));
  return null;
}
function blankChecklist(unitId) {
  const src = SPEC_CHECKLISTS[unitId];
  if (!src) return null;
  return src.map(x=>({...x,checked:false,ts:null}));
}
function buildBlank() {
  const s = {};
  UNITS.forEach(u => {
    s[u.id] = {
      manpower:  blankManpower(u.id),
      logistics: blankLogistics(u.id),
      ambulance: blankAmbulance(u.id),
      checklist: blankChecklist(u.id),
    };
  });
  s._cmd = { checklist: CMD_CHECKLIST.map(i=>({i,checked:false,ts:null})), note:"" };
  return s;
}

// ── CALCULATIONS ──────────────────────────────────────────────────────────────
function pct(num,den) { return den===0?100:Math.round((num/den)*100); }
function mpPct(manpower) {
  const mandatory = (manpower||[]).filter(r=>r.required>0);
  if (!mandatory.length) return 100;
  const req  = mandatory.reduce((s,r)=>s+r.required,0);
  const pres = mandatory.reduce((s,r)=>s+r.names.filter(n=>n.present).length,0);
  return pct(pres,req);
}
function listPct(list) {
  if (!list||!list.length) return 0;
  return pct(list.filter(x=>x.checked).length, list.length);
}
function unitOverall(ud, unitId) {
  if (!ud) return 0;
  if (SPEC_IDS.includes(unitId)) return listPct(ud.checklist);
  const mp=mpPct(ud.manpower), lg=listPct(ud.logistics), amb=listPct(ud.ambulance);
  return Math.round((mp+lg+amb)/3);
}
function sc(p) { return p===100?"#00ff9d":p>=70?"#ffb800":"#ff4444"; }
function ts() { return new Date().toLocaleTimeString("en-SG",{hour12:false}); }

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = buildBlank();
let user  = null;
let activeUnit = "MP1";
let showDetail = true;
let goLive = false;
let goLiveTs = null;
let loginAttempts = 0;

// ── FIREBASE (one-way: read only, write explicitly) ───────────────────────────
function fbListen() {
  onValue(ref(db,"r3"), snap => {
    const val = snap.val();
    if (!val) { render(); return; }
    if (val.units) {
      UNITS.forEach(u => {
        const fb = val.units[u.id];
        if (!fb) return;
        const s = state[u.id];
        // Manpower — skip for SPEC
        if (!SPEC_IDS.includes(u.id) && fb.manpower && Array.isArray(fb.manpower)) {
          fb.manpower.forEach((fr,i) => {
            if (s.manpower[i] && fr) {
              if (fr.names) s.manpower[i].names = fr.names;
              s.manpower[i].attachedCount   = fr.attachedCount||0;
              s.manpower[i].attachedPresent = fr.attachedPresent||0;
            }
          });
        }
        // Checklists
        if (fb.logistics && s.logistics) s.logistics = fb.logistics;
        if (fb.ambulance && s.ambulance) s.ambulance = fb.ambulance;
        if (fb.checklist && s.checklist) s.checklist = fb.checklist;
      });
    }
    if (val._cmd) {
      if (val._cmd.checklist) state._cmd.checklist = val._cmd.checklist;
      if (val._cmd.note !== undefined) {
        state._cmd.note = val._cmd.note;
        const el = document.getElementById("cmdNote");
        if (el && document.activeElement !== el) el.value = val._cmd.note;
      }
    }
    if (val.goLive) {
      goLive   = val.goLive.active||false;
      goLiveTs = val.goLive.time||null;
    }
    render();
  }, err => { console.warn("FB error:", err.message); render(); });
}
function fbSaveUnit(unitId) {
  const s = state[unitId];
  const payload = {};
  if (!SPEC_IDS.includes(unitId)) payload.manpower = s.manpower;
  if (s.logistics) payload.logistics = s.logistics;
  if (s.ambulance) payload.ambulance = s.ambulance;
  if (s.checklist) payload.checklist = s.checklist;
  update(ref(db,`r3/units/${unitId}`), payload);
}
function fbSaveCmd() { update(ref(db,"r3/_cmd"), state._cmd); }
function fbGoLive(active) {
  goLive = active; goLiveTs = active ? new Date().toISOString() : null;
  set(ref(db,"r3/goLive"), {active, time:goLiveTs, by:user?.label||"Commander"});
  renderBottom();
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
window.doLogin = async () => {
  if (loginAttempts >= 5) { document.getElementById("loginError").textContent="Too many attempts. Refresh."; return; }
  const pin = document.getElementById("pinInput").value.trim();
  if (!pin) { document.getElementById("loginError").textContent="Please enter your PIN."; return; }
  const h = await hashPin(pin);
  const u = HASHED[h];
  if (!u) {
    loginAttempts++;
    const rem = 5-loginAttempts;
    document.getElementById("loginError").textContent = rem>0 ? `Invalid PIN. ${rem} attempt(s) left.` : "Too many attempts. Refresh.";
    document.getElementById("pinInput").value="";
    return;
  }
  user = u; loginAttempts=0;
  sessionStorage.setItem("ndp_u", JSON.stringify(u));
  if (u.role==="unit") activeUnit = u.unitId;
  launch();
};
window.doLogout = () => {
  sessionStorage.removeItem("ndp_u"); user=null;
  document.getElementById("loginScreen").style.display="flex";
  document.getElementById("dashboard").style.display="none";
  document.getElementById("pinInput").value="";
  document.getElementById("loginError").textContent="";
};
function launch() {
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("dashboard").style.display="flex";
  document.getElementById("userLabel").textContent=user.label;
  state = buildBlank();
  render();
  fbListen();
}
const saved = sessionStorage.getItem("ndp_u");
if (saved) { user=JSON.parse(saved); if(user.role==="unit") activeUnit=user.unitId; launch(); }
document.addEventListener("keydown", e => {
  if (e.key==="Enter" && document.getElementById("loginScreen").style.display!=="none") doLogin();
});

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() { renderCards(); renderDetail(); renderBottom(); renderBadge(); }

function svgGauge(p, size=48) {
  const r=(size-8)/2, c=2*Math.PI*r, stroke=(p/100)*c, color=sc(p);
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1e2530" stroke-width="5"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="5"
      stroke-dasharray="${stroke} ${c}" stroke-linecap="round" style="filter:drop-shadow(0 0 4px ${color})"/>
    <text x="${size/2}" y="${size/2}" text-anchor="middle" dominant-baseline="central"
      style="transform:rotate(90deg);transform-origin:${size/2}px ${size/2}px;
      fill:${color};font-size:10px;font-family:'IBM Plex Mono',monospace;font-weight:600">${p}%</text>
  </svg>`;
}
function bar(p) {
  const color=sc(p);
  return `<div style="height:3px;background:#1a2530;border-radius:2px;margin-top:2px">
    <div style="height:100%;border-radius:2px;width:${p}%;background:${color};box-shadow:0 0 4px ${color};transition:width 0.3s"></div></div>`;
}

function renderCards() {
  [0,1,2].forEach(row => {
    const el = document.getElementById(`row${row}`);
    if (!el) return;
    el.innerHTML = UNITS.filter(u=>u.row===row).map(u => {
      const ud = state[u.id];
      const ov = unitOverall(ud, u.id);
      const isSpec = SPEC_IDS.includes(u.id);
      const isActive = activeUnit===u.id;
      const pc = u.type==="FAP"?"#a78bfa":u.type==="SPEC"?"#f59e0b":"#4a9eff";
      const prefix = u.prefix || u.type;
      const name = u.label.replace(/^MP\s+|^FAP\(E\)\s+/,"");
      let bars = "";
      if (isSpec) {
        const cp = listPct(ud.checklist);
        bars = `<div style="margin-top:6px"><div style="display:flex;justify-content:space-between">
          <span style="font-size:9px;color:#4a5a6a;letter-spacing:0.07em">READINESS</span>
          <span style="font-size:9px;color:${sc(cp)}">${cp}%</span></div>${bar(cp)}</div>`;
      } else {
        const mp=mpPct(ud.manpower), lg=listPct(ud.logistics), amb=listPct(ud.ambulance);
        bars = [["MANPOWER",mp],["LOGISTICS",lg],["AMBULANCE",amb]].map(([l,p])=>`
          <div style="margin-bottom:3px"><div style="display:flex;justify-content:space-between">
            <span style="font-size:9px;color:#4a5a6a;letter-spacing:0.07em">${l}</span>
            <span style="font-size:9px;color:${sc(p)}">${p}%</span></div>${bar(p)}</div>`).join("");
      }
      return `<button class="unit-card${isActive?" active":""}" onclick="selectUnit('${u.id}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
          <div>
            <div style="font-size:10px;font-weight:700;letter-spacing:0.1em;color:${pc};margin-bottom:1px">${prefix}</div>
            <div style="font-size:14px;font-weight:700;color:#e8f0f7;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.04em;line-height:1.2">${name}</div>
          </div>${svgGauge(ov)}
        </div>${bars}
      </button>`;
    }).join("");
  });
}

function renderDetail() {
  const unit = UNITS.find(u=>u.id===activeUnit);
  const ud = state[activeUnit];
  if (!unit||!ud) return;
  const pc = unit.type==="FAP"?"#a78bfa":unit.type==="SPEC"?"#f59e0b":"#4a9eff";
  const pbg = unit.type==="FAP"?"rgba(167,139,250,0.1)":unit.type==="SPEC"?"rgba(245,158,11,0.1)":"rgba(74,158,255,0.1)";
  const typeLabel = unit.type==="FAP"?"FAP(E)":unit.type==="SPEC"?"SPECIALIST":"MEDICAL POST";
  document.getElementById("detailHdr").innerHTML = `
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:11px;font-weight:700;letter-spacing:0.1em;color:${pc};background:${pbg};padding:3px 8px;border-radius:4px">${typeLabel}</span>
      <span style="font-size:20px;font-weight:700;color:#e8f0f7;font-family:'Syne',sans-serif;letter-spacing:0.04em">${unit.label}</span>
    </div>
    <div style="font-size:11px;color:#4a6a7a">Click any card above to switch</div>`;

  const isSpec = SPEC_IDS.includes(activeUnit);
  if (isSpec) {
    document.getElementById("detailPanels").style.gridTemplateColumns = "1fr";
    document.getElementById("detailPanels").innerHTML = `<div class="panel">${renderChecklist("READINESS", ud.checklist, "checklist")}</div>`;
  } else {
    document.getElementById("detailPanels").style.gridTemplateColumns = "1fr 2fr";
    document.getElementById("detailPanels").innerHTML = `
      <div class="panel">${renderManpower(ud.manpower)}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="panel">${renderChecklist("LOGISTICS / EQUIPMENT", ud.logistics, "logistics")}</div>
        <div class="panel">${renderChecklist("AMBULANCE", ud.ambulance, "ambulance")}</div>
      </div>`;
  }
}

function renderManpower(data) {
  const p=mpPct(data), color=sc(p);
  const numStyle = `width:46px;background:rgba(255,255,255,0.04);border:1px solid #1e2a35;border-radius:4px;color:#c8d8e4;padding:3px 5px;font-size:11px;font-family:'IBM Plex Mono',monospace;outline:none`;
  return `<div class="panel-hdr">
    <span class="dot" style="background:${color};box-shadow:0 0 6px ${color}"></span>
    <span class="panel-title">MANPOWER</span>
    <span style="font-size:13px;font-weight:700;color:${color}">${p}%</span>
  </div>
  ${(data||[]).map((role,ri) => `
    <div style="margin-bottom:8px">
      <div style="font-size:10px;color:#4a6a7a;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:3px">${role.role}</div>
      ${role.role==="Attached Staff" ? `
        <div style="display:flex;gap:6px;align-items:center">
          <input type="number" min="0" value="${role.attachedCount}" onchange="setAttached('${activeUnit}',${ri},'count',this.value)" style="${numStyle}"/>
          <span style="font-size:11px;color:#4a5a6a">/</span>
          <input type="number" min="0" value="${role.attachedPresent}" onchange="setAttached('${activeUnit}',${ri},'present',this.value)" style="${numStyle}"/>
          <span style="font-size:11px;color:#4a5a6a">present</span>
        </div>` : `
        <div style="display:flex;flex-wrap:wrap;gap:4px">
          ${role.names.map((person,ni) => {
            const bc=person.present?"#00ff9d":"#2e3a4a";
            const bg=person.present?"rgba(0,255,157,0.15)":"rgba(255,255,255,0.04)";
            const fc=person.present?"#00ff9d":"#6b7d8f";
            const tsL=person.ts?`<span style="font-size:8px;opacity:0.6;margin-left:3px">${person.ts}</span>`:"";
            return `<button onclick="togglePerson('${activeUnit}',${ri},${ni})"
              style="padding:4px 8px;border-radius:4px;border:1px solid ${bc};background:${bg};
              color:${fc};font-size:10px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center">
              ${person.name}${tsL}</button>`;
          }).join("")}
        </div>`}
    </div>`).join("")}`;
}

function renderChecklist(title, items, domain) {
  if (!items) return "";
  const p=listPct(items), color=sc(p);
  const cats = {};
  items.forEach((item,i) => { if(!cats[item.c]) cats[item.c]=[]; cats[item.c].push({...item,idx:i}); });
  return `<div class="panel-hdr">
    <span class="dot" style="background:${color};box-shadow:0 0 6px ${color}"></span>
    <span class="panel-title">${title}</span>
    <span style="font-size:13px;font-weight:700;color:${color}">${p}%</span>
  </div>
  ${Object.entries(cats).map(([cat,citems])=>`
    <div style="margin-bottom:10px">
      <div class="cat-label">${cat}</div>
      ${citems.map(ci=>{
        const bc=ci.checked?"#00ff9d":"#2e3a4a";
        const bg=ci.checked?"rgba(0,255,157,0.15)":"transparent";
        const fc=ci.checked?"#c8d8e4":"#5a6a7a";
        const tsL=ci.ts?`<span style="font-size:9px;color:#3a6a5a;margin-left:auto;padding-left:8px;flex-shrink:0">${ci.ts}</span>`:"";
        return `<label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;padding:3px 0">
          <input type="checkbox" ${ci.checked?"checked":""} onchange="toggleItem('${activeUnit}','${domain}',${ci.idx})" style="display:none"/>
          <span style="width:15px;height:15px;border:1px solid ${bc};border-radius:3px;background:${bg};
            display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all 0.15s">
            ${ci.checked?`<span style="color:#00ff9d;font-size:9px">✓</span>`:""}
          </span>
          <span style="font-size:11px;color:${fc};flex:1;line-height:1.4">${ci.i}</span>${tsL}
        </label>`;
      }).join("")}
    </div>`).join("")}`;
}

function renderBottom() {
  // Unit readiness dots
  document.getElementById("unitReadiness").innerHTML = UNITS.map(u=>{
    const ov = unitOverall(state[u.id], u.id);
    const color = sc(ov);
    return `<div style="display:flex;align-items:center;gap:5px">
      <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${color};box-shadow:0 0 5px ${color}"></span>
      <span style="font-size:11px;color:#8a9aaa">${u.label}</span>
      <span style="font-size:10px;font-weight:700;color:${color}">${ov}%</span>
    </div>`;
  }).join("");

  // Status warning
  const notReady = UNITS.filter(u=>unitOverall(state[u.id],u.id)<100).length;
  document.getElementById("readinessStatus").innerHTML = notReady>0 && !goLive
    ? `<span style="color:#ffb800">⚠ ${notReady} unit(s) not yet at 100%</span>` : "";

  // Go live time
  document.getElementById("goLiveTime").textContent = goLive && goLiveTs
    ? `GO LIVE declared at ${new Date(goLiveTs).toLocaleTimeString("en-SG",{hour12:false})} by ${user?.label||"Commander"}`
    : "";

  // Commander checklist
  const cmdList = state._cmd.checklist||[];
  const cp = listPct(cmdList);
  document.getElementById("cmdPct").textContent = `${cp}%`;
  document.getElementById("cmdPct").style.color = sc(cp);
  document.getElementById("cmdChecklist").innerHTML = cmdList.map((ci,i)=>{
    const bc=ci.checked?"#00ff9d":"#2e3a4a";
    const bg=ci.checked?"rgba(0,255,157,0.15)":"transparent";
    const fc=ci.checked?"#c8d8e4":"#5a6a7a";
    const tsL=ci.ts?`<span style="font-size:9px;color:#3a6a5a;margin-left:auto">${ci.ts}</span>`:"";
    return `<label style="display:flex;align-items:center;gap:7px;cursor:pointer;padding:2px 0">
      <input type="checkbox" ${ci.checked?"checked":""} onchange="toggleCmd(${i})" style="display:none"/>
      <span style="width:14px;height:14px;border:1px solid ${bc};border-radius:3px;background:${bg};
        display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s">
        ${ci.checked?`<span style="color:#00ff9d;font-size:8px">✓</span>`:""}
      </span>
      <span style="font-size:11px;color:${fc};flex:1">${ci.i}</span>${tsL}
    </label>`;
  }).join("");

  // Go live button
  document.getElementById("goLiveBtn").innerHTML = goLive
    ? `<button onclick="fbGoLive(false)" style="padding:9px 18px;background:rgba(255,68,68,0.1);border:1px solid #ff4444;border-radius:6px;color:#ff4444;font-family:'Syne',sans-serif;font-size:12px;font-weight:800;letter-spacing:0.1em;cursor:pointer;white-space:nowrap">STAND DOWN</button>`
    : `<button onclick="fbGoLive(true)" style="padding:9px 18px;background:rgba(0,255,157,0.1);border:1px solid #00ff9d;border-radius:6px;color:#00ff9d;font-family:'Syne',sans-serif;font-size:12px;font-weight:800;letter-spacing:0.1em;cursor:pointer;white-space:nowrap">DECLARE GO LIVE</button>`;
}

function renderBadge() {
  const badge = document.getElementById("goLiveBadge");
  const color = goLive?"#00ff9d":"#ff4444";
  const bg    = goLive?"rgba(0,255,157,0.12)":"rgba(255,68,68,0.1)";
  badge.style.cssText=`display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:6px;border:1px solid ${color};font-family:'Syne',sans-serif;font-size:12px;font-weight:800;letter-spacing:0.12em;background:${bg};color:${color}`;
  badge.innerHTML=`<span style="width:8px;height:8px;border-radius:50%;background:${color};box-shadow:0 0 8px ${color};display:inline-block;animation:${goLive?"pulse 1.5s infinite":"none"}"></span>${goLive?"GO LIVE":"STANDBY"}`;
}

// ── EVENT HANDLERS ────────────────────────────────────────────────────────────
window.selectUnit = id => { activeUnit=id; renderCards(); renderDetail(); };

window.togglePerson = (unitId, ri, ni) => {
  const p = state[unitId].manpower[ri].names[ni];
  p.present=!p.present; p.ts=p.present?ts():null;
  fbSaveUnit(unitId);
  renderCards(); renderDetail(); renderBottom();
};

window.setAttached = (unitId, ri, field, val) => {
  const num=Math.max(0,parseInt(val)||0);
  const role=state[unitId].manpower[ri];
  if(field==="count") role.attachedCount=num;
  else role.attachedPresent=Math.min(num,role.attachedCount);
  fbSaveUnit(unitId);
  renderCards(); renderBottom();
};

window.toggleItem = (unitId, domain, idx) => {
  const item=state[unitId][domain][idx];
  item.checked=!item.checked; item.ts=item.checked?ts():null;
  fbSaveUnit(unitId);
  renderCards(); renderDetail(); renderBottom();
};

window.toggleCmd = i => {
  const ci=state._cmd.checklist[i];
  ci.checked=!ci.checked; ci.ts=ci.checked?ts():null;
  fbSaveCmd(); renderBottom();
};

window.toggleDetail = () => {
  showDetail=!showDetail;
  document.getElementById("detailSection").style.display=showDetail?"block":"none";
  document.getElementById("toggleBtn").textContent=showDetail?"HIDE CHECKLIST ▲":"SHOW CHECKLIST ▼";
};

document.getElementById("cmdNote").addEventListener("input", e => {
  state._cmd.note=e.target.value; fbSaveCmd();
});

// ── CLOCK ─────────────────────────────────────────────────────────────────────
function tick() {
  const now=new Date();
  document.getElementById("clockTime").textContent=now.toLocaleTimeString("en-SG",{hour12:false});
  document.getElementById("clockDate").textContent=now.toLocaleDateString("en-SG",{day:"2-digit",month:"short",year:"numeric"});
}
setInterval(tick,1000); tick();
</script>
